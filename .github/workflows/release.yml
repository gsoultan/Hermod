name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
          cache: 'bun'
          cache-dependency-path: ui/bun.lock

      - name: Build UI
        run: go run cmd/hermod/main.go --build-ui --mode build-only

      - name: Update version in source
        run: |
          ./scripts/update-version.sh
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add internal/version/version.go
          git commit -m "chore: update version to ${{ github.ref_name }}" || echo "No changes to commit"
          git push origin HEAD:main || echo "Failed to push"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean --skip=validate
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
